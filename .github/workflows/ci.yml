name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          find src tests -name "*.cpp" -o -name "*.hpp" | xargs clang-format --dry-run --Werror

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ffmpeg
      - name: Configure (Debug)
        run: cmake --preset debug
      - name: Build
        run: cmake --build build/debug
      - name: Create test input file
        run: |
          ffmpeg -f lavfi -i testsrc=duration=1:size=128x72:rate=1 -c:v libx264 -t 1 tests/input.mp4 -y 2>/dev/null
      - name: Run Tests
        run: ctest --preset debug

  build:
    name: Build (Release)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
      - name: Configure (Release)
        run: cmake --preset release
      - name: Build
        run: cmake --build build/release
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: davinci-video-converter
          path: build/release/davinci-video-converter
